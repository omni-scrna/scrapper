[workspace]
authors = ["ben <ben.uzh@proton.me>"]
channels = ["conda-forge", "bioconda"]
name = "scrapper"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
check = "Rscript check.R"
validate = "Rscript validators/pca_output.R"
export-env = "pixi workspace export conda-environment --name $(basename $(git rev-parse --show-toplevel)) envs/scrapper.yml && sed -i '1s/^/# this file was auto-generated by pixi - do not edit by hand\\n/' envs/scrapper.yml"

[dependencies]
r-base = ">=4.5"
bioconductor-scrapper = "*"
bioconductor-biocsingular = "*"
bioconductor-rhdf5 = "*"
bioconductor-delayedarray = "*"
bioconductor-hdf5array = "*"
r-matrix = "*"
r-optparse = "*"
